# Org Chargate security gate (MegaLinter-backed, net-new PR-diff gating), consumed
# as the Chargate MARKETPLACE ACTION. It gates on net-new findings on pull requests.
#
# pull_request only: the push-to-default baseline scan was dropped. Every merge to
# the default branch (including the Caldrith-managed and Diatreme version-bump/tag
# commits) otherwise kicks off a full ~15-min MegaLinter run — the single biggest
# source of wasted CI. PR-time net-new gating is retained; the default-branch
# baseline SARIF on the Security tab is simply no longer refreshed (it needs GHAS on
# private repos anyway, and the code_scanning ruleset gate is CodeQL, not chargate).
name: Security

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write
  # codeql-action/upload-sarif (and Chargate's status telemetry) read this run's
  # metadata via GET /actions/runs/{id}; without actions:read that 403s with
  # "Resource not accessible by integration" and the SARIF upload errors.
  actions: read

jobs:
  chargate:
    # Per-repo runner toggle, shared with the release (Diatreme) workflow.
    # Set the SELFHOSTED_GITHUB_RUNNER variable to a self-hosted runner label
    # to route this repo's managed workflows to a cluster pool — free minutes
    # and a warm MegaLinter image. Leave it unset/blank to stay on
    # GitHub-hosted; blanking it is also the instant escape hatch if the
    # self-hosted runners bomb out.
    runs-on: ${{ vars.SELFHOSTED_GITHUB_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: magmamoose/chargate@eaac494291b73dd9586875ba8aaed658ca24eb6c # v2.8.0
        with:
          defectdojo_url: ${{ vars.MM_DEFECTDOJO_URL }}
          defectdojo_token: ${{ secrets.MM_DEFECTDOJO_API_KEY }}
          dependency_track_url: ${{ vars.MM_DEPENDENCY_TRACK_URL }}
          dependency_track_token: ${{ secrets.MM_DEPENDENCY_TRACK_API_KEY }}
