# Org Chargate security gate (MegaLinter-backed, net-new PR-diff gating), consumed
# as the Chargate MARKETPLACE ACTION. On PRs it gates on net-new findings; on push
# to the default branch it runs a non-gating baseline scan and ships the full SARIF.
name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  chargate:
    runs-on: ubuntu-latest
    steps:
      - uses: magmamoose/chargate@v2
